name: Build (staging)

on:
  push:
    branches:
      - main
      - master
      - bugfix/*
      - feature/*
      - hotfix/*
      - release/*
      - task/*
      - migration/*
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NUGET_CONFIG_GCS_PATH: ${{ vars.NUGET_CONFIG_GCS_PATH || 'gs://firefly-devops-2018-configuration/NuGet.config' }}
      GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER || 'projects/291751773399/locations/global/workloadIdentityPools/devops/providers/github-actions' }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT || 'github-actions-build@firefly-devops-2018.iam.gserviceaccount.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Authenticate to Google Cloud
        id: gcp-auth
        continue-on-error: true
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        if: ${{ steps.gcp-auth.outcome == 'success' }}
        continue-on-error: true
        uses: google-github-actions/setup-gcloud@v2

      - name: Download NuGet.config from GCS
        if: ${{ steps.gcp-auth.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        run: gcloud storage cp "$NUGET_CONFIG_GCS_PATH" ./NuGet.config

      - name: Create NuGet.config from secret fallback
        if: ${{ secrets.NUGET_CONFIG != '' }}
        shell: bash
        run: |
          if [ ! -f NuGet.config ]; then
            cat > NuGet.config <<'EOF'
            ${{ secrets.NUGET_CONFIG }}
            EOF
          fi

      - name: Restore
        shell: bash
        run: |
          if [ -f NuGet.config ]; then
            dotnet restore Dojo.Generators.sln --configfile NuGet.config
          else
            dotnet restore Dojo.Generators.sln
          fi

      - name: Build
        run: dotnet build Dojo.Generators.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Dojo.Generators.Tests/Dojo.Generators.Tests.csproj --configuration Release --no-build
